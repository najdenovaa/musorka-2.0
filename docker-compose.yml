services:
  backend:
    build:
      context: ./expo
      dockerfile: ../docker/backend.Dockerfile
    container_name: bp-backend
    restart: unless-stopped
    network_mode: host
    environment:
      PORT: ${PORT:-3000}
      DATABASE_URL: ${DATABASE_URL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://app.musorka.su,musorka://}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_SECURE: ${SMTP_SECURE:-false}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  nginx:
    build:
      context: .
      dockerfile: docker/nginx.Dockerfile
      args:
        API_BASE_URL: ${API_BASE_URL:-https://app.musorka.su}
    container_name: bp-nginx
    restart: unless-stopped
    network_mode: host
    depends_on:
      - backend
    volumes:
      - ./docker/nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/legal:/usr/share/nginx/legal:ro
      - ./ssl:/etc/nginx/ssl:ro
