limit_req_zone $binary_remote_addr zone=api_per_ip:20m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_otp_per_ip:20m rate=20r/m;
limit_req_zone $binary_remote_addr zone=auth_flow_per_ip:20m rate=60r/m;
limit_conn_zone $binary_remote_addr zone=conn_per_ip:20m;

upstream backend {
    server 127.0.0.1:3000;
    keepalive 64;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name app.musorka.su;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 50M;
    client_body_buffer_size 1M;
    limit_req_status 429;
    limit_conn conn_per_ip 40;

    set_real_ip_from 127.0.0.1;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    location = /health {
        proxy_pass http://backend/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_connect_timeout 15s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location = /api {
        return 404;
    }

    location = /api/init-db {
        return 404;
    }

    location = /api/fix-seed {
        return 404;
    }

    location = /privacy-policy {
        root /usr/share/nginx/legal;
        try_files /privacy-policy.html =404;
        default_type text/html;
        charset utf-8;
        add_header Cache-Control "public, max-age=300" always;
    }

    location = /privacy-policy.html {
        root /usr/share/nginx/legal;
        try_files /privacy-policy.html =404;
        default_type text/html;
        charset utf-8;
        add_header Cache-Control "public, max-age=300" always;
    }

    location = /user-agreement {
        root /usr/share/nginx/legal;
        try_files /user-agreement.html =404;
        default_type text/html;
        charset utf-8;
        add_header Cache-Control "public, max-age=300" always;
    }

    location = /user-agreement.html {
        root /usr/share/nginx/legal;
        try_files /user-agreement.html =404;
        default_type text/html;
        charset utf-8;
        add_header Cache-Control "public, max-age=300" always;
    }

    location = /support {
        root /usr/share/nginx/legal;
        try_files /support.html =404;
        default_type text/html;
        charset utf-8;
        add_header Cache-Control "public, max-age=300" always;
    }

    location = /support.html {
        root /usr/share/nginx/legal;
        try_files /support.html =404;
        default_type text/html;
        charset utf-8;
        add_header Cache-Control "public, max-age=300" always;
    }

    location = /api/trpc/auth.sendVerificationCode {
        if ($request_method !~ ^(POST|OPTIONS)$) { return 405; }
        limit_req zone=auth_otp_per_ip burst=10 nodelay;
        add_header Retry-After "30" always;
        proxy_pass http://backend;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_connect_timeout 45s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
    }

    location = /api/trpc/auth.verifyCode {
        if ($request_method !~ ^(POST|OPTIONS)$) { return 405; }
        limit_req zone=auth_otp_per_ip burst=15 nodelay;
        add_header Retry-After "30" always;
        proxy_pass http://backend;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_connect_timeout 45s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
    }

    location = /api/trpc/auth.loginSendCode {
        if ($request_method !~ ^(POST|OPTIONS)$) { return 405; }
        limit_req zone=auth_flow_per_ip burst=30 nodelay;
        add_header Retry-After "30" always;
        proxy_pass http://backend;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_connect_timeout 45s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
    }

    location = /api/trpc/auth.loginVerifyComplete {
        if ($request_method !~ ^(POST|OPTIONS)$) { return 405; }
        limit_req zone=auth_flow_per_ip burst=30 nodelay;
        add_header Retry-After "30" always;
        proxy_pass http://backend;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_connect_timeout 45s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
    }

    location = /api/trpc/auth.resetPassword {
        if ($request_method !~ ^(POST|OPTIONS)$) { return 405; }
        limit_req zone=auth_flow_per_ip burst=30 nodelay;
        add_header Retry-After "30" always;
        proxy_pass http://backend;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_connect_timeout 45s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
    }

    location ^~ /api/trpc {
        if ($request_method !~ ^(GET|POST|OPTIONS)$) { return 405; }
        limit_req zone=api_per_ip burst=60 nodelay;
        proxy_pass http://backend;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_connect_timeout 45s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
        proxy_buffering on;
        proxy_buffers 16 16k;
        proxy_busy_buffers_size 32k;
        proxy_request_buffering on;
    }

    location = /api/upload {
        if ($request_method !~ ^(POST|OPTIONS)$) { return 405; }
        limit_req zone=api_per_ip burst=30 nodelay;
        client_max_body_size 50M;
        proxy_pass http://backend;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location ^~ /api/ {
        return 404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

